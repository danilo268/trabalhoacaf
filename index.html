<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>ACAF - Treino</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>💪 ACAF</h1>

      <!-- 🔥 FORMULÁRIO -->
      <div class="card">
        <input id="nome" placeholder="Nome" />
        <input id="idade" placeholder="Idade" />
        <input id="peso" placeholder="Peso" />
        <input id="altura" placeholder="Altura" />

        <button onclick="gerar()">Gerar Ficha</button>
        <button onclick="verDados()">Ver Histórico</button>
      </div>

      <!-- 🔥 RESULTADO -->
      <p id="perfil"></p>
      <p id="imc"></p>
      <p id="proteina"></p>
      <p id="objetivo"></p>

      <div id="ficha"></div>
    </div>

    <!-- 🔥 IMPORTANTE: JS SEMPRE NO FINAL -->
    <script src="app.js"></script>
  </body>
</html>
